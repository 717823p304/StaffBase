# Server Port configuration
server.port=5000
server.servlet.context-path=/api

# MySQL Configuration (SQL Tables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/staffbase?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false

# MongoDB Configuration (NoSQL Tables - Local MongoDB Server)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/staffbase}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom JWT configurations
jwt.secret=${JWT_SECRET:REPLACE_ME_WITH_A_SECURE_64_CHAR_HEX_SECRET_BEFORE_DEPLOYING}
# Access Token expiration: 15 minutes (900000 ms)
jwt.accessTokenExpirationMs=900000
# Refresh Token expiration: 7 days (604800000 ms)
jwt.refreshTokenExpirationMs=604800000

# File Upload storage directory
file.upload-dir=uploads
