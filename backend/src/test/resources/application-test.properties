# Test configuration - H2 in-memory database instead of MySQL/MongoDB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable MongoDB auto-config for unit tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# JWT test config
jwt.secret=TestSecretKeyThatIsAtLeast64BytesLongForHS512AlgorithmTestingPurposesOnly1234567890
jwt.accessTokenExpirationMs=900000
jwt.refreshTokenExpirationMs=604800000
